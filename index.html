<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Password Generator</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="generator">
        <div class="ins">
          <h1>Generate a</h1>
          <h1>Random Password</h1>
        </div>
        <div class="input">
          <input type="text" name="pass" id="pass" readonly />
        </div>
        <div class="pass-length">
          <div class="mb-3">
            <input
              type="number"
              class="form-control"
              min="4"
              max="24"
              placeholder="Length: 4-24"
              id="length"
            />
          </div>
        </div>
        <div class="characters">
          <p class="contains">Must include:</p>
          <div class="custom-control custom-checkbox">
            <input type="checkbox" class="custom-control-input" id="check1" />
            <label class="custom-control-label" for="check1">ABC</label>
          </div>
          <div class="custom-control custom-checkbox">
            <input type="checkbox" class="custom-control-input" id="check2" />
            <label class="custom-control-label" for="check2">123</label>
          </div>
          <div class="custom-control custom-checkbox">
            <input type="checkbox" class="custom-control-input" id="check3" />
            <label class="custom-control-label" for="check3">!@#</label>
          </div>
        </div>
        <div class="buttons">
          <div class="button-generator">
            <button>Generate Password</button>
          </div>
          <div class="button-copy">
            <button>Copy</button>
          </div>
        </div>
      </div>
    </div>
    <div class="alert">
      <h1>COPIED</h1>
    </div>
  </body>
  <script src="app.js"></script>
</html>
