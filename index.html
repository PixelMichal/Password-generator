<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Password Generator</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <section class="generator" aria-labelledby="title">
        <div class="ins">
          <h1 id="title">Generate a</h1>
          <h1>Random Password</h1>
        </div>
        <div class="input">
          <input
            type="text"
            name="pass"
            id="pass"
            class="form-control"
            placeholder="Your password will appear here"
            readonly
          />
        </div>
        <label for="length">Password length</label>
        <div class="pass-length">
          <div class="mb-3">
            <input
              type="number"
              class="form-control"
              min="4"
              max="24"
              placeholder="Length: 4-24"
              value="12"
              id="length"
            />
          </div>
        </div>
        <div class="characters">
          <p class="contains">Include:</p>
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="check1" />
            <label class="form-check-label" for="check1">ABC</label>
          </div>
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="check2" />
            <label class="form-check-label" for="check2">123</label>
          </div>
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="check3" />
            <label class="form-check-label" for="check3">!@#</label>
          </div>
        </div>
        <div class="buttons">
          <div class="button-generator">
            <button type="button" class="btn btn-success">
              Generate Password
            </button>
          </div>
          <div class="button-copy">
            <button type="button" class="btn btn-outline-light">Copy</button>
          </div>
        </div>
      </section>
    </main>
    <div class="alert alert-success" role="status" aria-live="polite">
      <p>COPIED</p>
    </div>
    <script src="app.js"></script>
  </body>
</html>
